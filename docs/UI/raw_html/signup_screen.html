<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaizen - Sign Up</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        space: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        appBg: '#18121d',
                        cardBg: '#231b29',
                        inputBg: '#18121d',
                        brandOrange: '#d5601c',
                        brandPink: '#db87af',
                        buttonPinkStart: '#ebd1de',
                        buttonPinkEnd: '#d498b6'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-appBg text-white font-sans min-h-screen flex flex-col">

    <!-- Navigation Bar -->
    <nav class="flex items-center justify-between px-8 py-5 border-b border-white/5">
        <div class="flex items-center space-x-12">
            <!-- Logo -->
            <div class="text-2xl font-bold tracking-wider cursor-pointer font-space">
                <span>KAI</span><span class="text-brandOrange">ZEN</span>
            </div>
            
            <!-- Links -->
            <div class="hidden md:flex space-x-6 text-sm font-medium">
                <a href="#" class="text-white relative pb-1">
                    Dashboard
                    <span class="absolute left-0 bottom-0 w-full h-[2px] bg-brandOrange"></span>
                </a>
                <a href="#" class="text-gray-400 hover:text-white transition-colors relative pb-1">
                    something
                </a>
            </div>
        </div>

        <!-- Icons -->
        <div class="flex items-center space-x-5 text-gray-400">
            <button class="hover:text-white transition-colors">
                <i data-lucide="bell" class="w-5 h-5"></i>
            </button>
            <button class="hover:text-white transition-colors">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 flex items-center justify-center p-4">
        
        <!-- Sign Up Card -->
        <div class="bg-cardBg w-full max-w-[480px] rounded-2xl shadow-2xl p-10 md:p-12 relative overflow-hidden">
            <!-- Subtle top highlight for the card -->
            <div class="absolute top-0 left-0 w-full h-[1px] bg-white/5"></div>

            <h1 class="text-2xl md:text-[28px] font-bold text-center mb-10 leading-tight">Create An Account To Get Started Now!</h1>

            <form action="#" class="space-y-5">
                
                <!-- Email Input -->
                <div class="space-y-2">
                    <label class="block text-[11px] font-semibold text-gray-400 tracking-wider uppercase">Email</label>
                    <div class="relative flex items-center">
                        <input type="email" placeholder="Email@zibi.com" 
                            class="w-full bg-inputBg text-sm text-white rounded-lg px-4 py-3.5 outline-none border border-transparent focus:border-brandPink/50 transition-colors placeholder:text-gray-600">
                        <span class="absolute right-4 text-gray-500 text-sm font-medium">@</span>
                    </div>
                </div>

                <!-- Password Input -->
                <div class="space-y-2">
                    <label class="block text-[11px] font-semibold text-gray-400 tracking-wider uppercase">Password</label>
                    <div class="relative flex items-center">
                        <input type="password" value="............" 
                            class="w-full bg-inputBg text-sm text-white rounded-lg px-4 py-3.5 outline-none border border-transparent focus:border-brandPink/50 transition-colors tracking-widest text-gray-400">
                        <i data-lucide="lock" class="absolute right-4 w-4 h-4 text-gray-500"></i>
                    </div>
                </div>

                <!-- Confirm Password Input -->
                <div class="space-y-2">
                    <label class="block text-[11px] font-semibold text-gray-400 tracking-wider uppercase">Confirm Password</label>
                    <div class="relative flex items-center">
                        <input type="password" value="............" 
                            class="w-full bg-inputBg text-sm text-white rounded-lg px-4 py-3.5 outline-none border border-transparent focus:border-brandPink/50 transition-colors tracking-widest text-gray-400">
                        <i data-lucide="lock" class="absolute right-4 w-4 h-4 text-gray-500"></i>
                    </div>
                </div>

                <!-- Sign Up Button -->
                <button type="button" class="w-full mt-8 bg-gradient-to-r from-buttonPinkStart to-buttonPinkEnd text-black font-bold rounded-lg py-3.5 flex items-center justify-center hover:opacity-90 transition-opacity">
                    <span>Sign Up</span>
                </button>

                <!-- Divider -->
                <div class="flex items-center my-8">
                    <div class="flex-1 h-[1px] bg-white/10"></div>
                    <span class="px-4 text-sm font-medium text-white">Or Sign Up with</span>
                    <div class="flex-1 h-[1px] bg-white/10"></div>
                </div>

                <!-- Social Login -->
                <div class="flex items-center space-x-4">
                    <button type="button" class="flex-1 bg-inputBg rounded-lg py-3 flex justify-center hover:bg-white/5 transition-colors">
                        <!-- Google SVG -->
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                    </button>
                    <button type="button" class="flex-1 bg-inputBg rounded-lg py-3 flex justify-center hover:bg-white/5 transition-colors">
                        <!-- Facebook SVG -->
                        <svg class="w-5 h-5" fill="#1877F2" viewBox="0 0 24 24">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                    </button>
                </div>

                <!-- Login Link -->
                <div class="text-center mt-8 text-sm">
                    <span class="text-brandPink/80 font-medium">Already Have An Account?</span> 
                    <a href="#" class="text-white font-semibold hover:underline ml-1">Login Now</a>
                </div>

            </form>
        </div>
    </main>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
