<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaizen - The QA Brain</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        manrope: ['Manrope', 'sans-serif'],
                        space: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        appBg: '#130d17',
                        brandOrange: '#d5601c',
                        brandPink: '#db87af',
                        buttonPinkStart: '#ebd1de',
                        buttonPinkEnd: '#d498b6'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-appBg text-white font-sans min-h-screen flex flex-col overflow-hidden relative">

    <!-- Navigation Bar -->
    <nav class="flex items-center justify-between px-8 py-5 relative z-20">
        <div class="flex items-center space-x-12">
            <!-- Logo -->
            <div class="text-2xl font-bold tracking-wider cursor-pointer font-space">
                <span>KAI</span><span class="text-brandOrange">ZEN</span>
            </div>
            
            <!-- Links -->
            <div class="hidden md:flex space-x-6 text-sm font-medium">
                <a href="#" class="text-white relative pb-1">
                    Dashboard
                    <span class="absolute left-0 bottom-0 w-full h-[2px] bg-brandOrange"></span>
                </a>
                <a href="#" class="text-gray-400 hover:text-white transition-colors relative pb-1">
                    something
                    <span class="absolute left-0 bottom-0 w-full h-[2px] bg-brandOrange"></span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Background Glow Effects (Simulating the 3D Brain) -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] pointer-events-none z-0">
        <!-- Purple ambient glow -->
        <div class="absolute inset-0 bg-purple-900/30 rounded-full blur-[120px]"></div>
        <!-- Orange inner glow -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-brandOrange/20 rounded-full blur-[100px]"></div>
        <!-- Pink accent glow -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/4 w-[400px] h-[400px] bg-brandPink/10 rounded-full blur-[90px]"></div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-center p-4 relative z-10 -mt-10">
        
        <!-- Version Badge -->
        <div class="inline-flex items-center space-x-2 border border-brandPink/30 rounded-full px-4 py-1.5 mb-8 bg-black/20 backdrop-blur-md">
            <i data-lucide="brain" class="w-3.5 h-3.5 text-brandPink"></i>
            <span class="text-[10px] text-brandPink tracking-[0.2em] font-semibold uppercase">Neural Architecture V2.4</span>
        </div>

        <!-- Typography -->
        <div class="text-center space-y-2">
            <h1 class="text-6xl md:text-7xl font-bold tracking-tight">
                <span class="font-space">KAI</span><span class="text-brandOrange font-space">ZEN</span><span class="text-brandPink font-manrope">:The QA</span>
            </h1>
            <h1 class="text-6xl md:text-7xl font-bold tracking-tight text-brandPink font-manrope">
                Brain
            </h1>
        </div>

        <!-- Subtitle -->
        <p class="mt-8 text-lg md:text-xl text-gray-300/80 font-light max-w-xl text-center">
            Autonomous QA testing that actually understands<br>your interface
        </p>

        <!-- Action Buttons -->
        <div class="mt-12 flex flex-col items-center space-y-4 w-full max-w-[320px]">
            <!-- Login Button -->
            <button class="w-full py-4 rounded-xl border border-brandOrange/50 text-brandOrange font-medium bg-[#1a121d]/80 hover:bg-brandOrange/10 transition-all backdrop-blur-sm">
                Login
            </button>
            
            <!-- Sign Up Button -->
            <button class="w-full py-4 rounded-xl bg-gradient-to-r from-buttonPinkStart to-buttonPinkEnd text-black font-semibold hover:opacity-90 transition-opacity shadow-[0_0_20px_rgba(219,135,175,0.2)]">
                Sign Up
            </button>
        </div>

    </main>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
